  <script>
    function confirmSrDelete() {
      const id = document.getElementById('servicesDeleteID').value;
      $.ajax({
        url: apiUrl + 'Trade?id=' + id,
        type: 'delete',
        contentType: 'application/json',
        headers: {
          "Authorization": `Bearer ${jwtToken}`
        },
        success: function (response) {
          document.getElementById('popupDelete').style.display = 'none'
          console.log(response);

          if (response.success) {

            let statusMsg = {
              text: "successfully.",
              duration: 3000,
              destination: "#",
              newWindow: true,
              close: true,
              gravity: "bottom",
              position: "center",
              stopOnFocus: false,
              style: {
                background: "#458746",
              },
            };
            Toastify(statusMsg).showToast();
            updateServices()
          }
          else {
            let statusMsg = {
              text: response.data.error_message,
              duration: 3000,
              destination: "#",
              newWindow: true,
              close: true,
              gravity: "bottom",
              position: "center",
              stopOnFocus: false,
              style: {
                background: "#FF0000",
              },
            };
            Toastify(statusMsg).showToast();
          }

        },
        error: function (xhr, status, error) {
          document.getElementById('popupDelete').style.display = 'none'
          console.error('Error:', error);
          let statusMsg = {
            text: "Error.",
            duration: 3000,
            destination: "#",
            newWindow: true,
            close: true,
            gravity: "bottom",
            position: "center",
            stopOnFocus: false,
            style: {
              background: "#FF0000",
            },
          };
          Toastify(statusMsg).showToast();

        }
      });
    }
    function closePopupDelete() {
      document.getElementById('popupDelete').style.display = 'none'
    }
    function checkID() {
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);
      const paramValue = urlParams.get('id');
      if (paramValue) {
        document.getElementById('URLaddservice').href = `add_service_record.html?id=${paramValue}`;
        document.getElementById('addserviceURL').href = `add_service_record.html?id=${paramValue}`;
      }
    }
    checkID()
  </script>

  <script>
    const dropdownToggles = document.querySelectorAll(".dropdown-toggle");

    dropdownToggles.forEach((toggle) => {
      toggle.addEventListener("click", function () {
        const content = this.nextElementSibling;
        const arrowIcon = this.querySelector(".arrow-icon-responsive img");

        // Hide all other contents
        document.querySelectorAll(".dropdown-content").forEach((otherContent) => {
          if (otherContent !== content) {
            otherContent.classList.remove("show");
            // Remove rotation from other arrow icons
            const otherArrowIcon = otherContent.previousElementSibling.querySelector(".arrow-icon-responsive img");
            if (otherArrowIcon) {
              otherArrowIcon.classList.remove("rotated");
            }
          }
        });

        // Toggle the current content
        content.classList.toggle("show");
        // Toggle the rotation of the arrow icon
        arrowIcon.classList.toggle("rotated");
      });
    });
  </script>
