  <style>
    .search-bar,
    .searchIcon {
      visibility: hidden;

    }

    .upload-section-2 {
      padding: 1rem 1rem 2rem 1rem;
      width: 100%;
      background-color: #fff;
      height: 98%;
      border: 2px solid #F5F9FF;
      box-shadow: 0px 0px 4px rgb(14 70 163 / 17%);
      border-radius: 15px;
      display: flex;
      justify-content: space-between;
      flex-direction: column;
    }

    .upload-section-2__upload-box {
      border: 2px dashed #ccc;
      padding: 20px;
      text-align: center;
      position: relative;
      border-radius: 8px;
      flex-grow: 1.7;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10%;
      flex-direction: column;
      cursor: pointer;
    }

    .upload-section-2__upload-icon {
      width: 50px;
      height: 50px;
      background-size: contain;
      margin: 0 auto;
    }

    .upload-section-2__file-size {
      color: #012970;
    }

    .upload-section-2__preview-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 95%;
      margin-left: auto;
      margin-right: auto;
    }

    .upload-section-2__preview-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 10px;
      /* width: 95%; */
    }

    .upload-section-2__preview-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
    }

    .upload-section-2__overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      cursor: pointer;
      pointer-events: none;
    }

    .upload-section-2__preview-item:hover .upload-section-2__overlay {
      opacity: 1;
      pointer-events: auto;
    }

    .upload-section-2__view-icon {
      width: 24px;
      height: 24px;
      background-size: contain;
    }

    /* Mobile View */
    @media (max-width: 750px) {
      .button-container {
        margin-top: 1rem;
      }

      .upload-section-2__preview-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 11% 1%;
        place-items: center;
        margin-top: 2.5%;

      }

      .upload-section-2__preview-item {
        position: relative;
        aspect-ratio: 1;
        overflow: hidden;
        width: 90%;
      }
    }

    .upload-section-2__file-size-divider {
      border-bottom: 0.125rem dashed #4154f1b3;
      margin: 1rem 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0 0rem 1rem 0rem;
    }

    .form-section {
      grid-column: span 8;
      background-color: white;
      padding: 20px;
      border: 2px solid #F5F9FF;
      box-shadow: 0px 0px 4px rgb(14 70 163 / 17%);
      border-radius: 15px;
      box-sizing: border-box;
    }

    .upload-left {
      grid-column: span 3;
    }

    .container {
      min-width: 100%;
      display: grid;
      grid-template-columns: repeat(11, 1fr);
      gap: 10px;
      flex-grow: 1;
      height: calc(100% - 5rem);
      width: 100%;
      box-sizing: border-box;
    }

    @media screen and (min-width: 750px) and (max-width: 992px) {
      .upload-section-2__preview-grid {
        width: 100%;
        display: flex;
        justify-content: space-around;
        height: 10rem;
      }
    }

    .upload-selection-text {
      font-size: 0.8rem;
    }

    img.upload-section-2__upload-img {
      width: 3.5rem;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgb(0, 0, 0);
      background-color: rgba(0, 0, 0, 0.9);
    }

    .close {
      position: absolute;
      top: 15px;
      right: 35px;
      color: #f1f1f1;
      font-size: 40px;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
    }

    .modal-content {
      margin: auto;
      display: block;
      width: 50%;
      max-width: 700px;
    }

    /* Hide the overlay icons by default */
    .upload-section-2__overlay-icons {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    /* Show the overlay icons on hover */
    .upload-section-2__preview-item:hover .upload-section-2__overlay-icons {
      display: flex;
    }
  </style>

  <script>
    function displayDummyImagesLoader() {
      const previewGrid = document.getElementById('previewGrid');
      // Get the count of current uploaded images
      const currentUploadedImages = previewGrid.querySelectorAll('.upload-section-2__preview-item img:not(.dummy)').length;
      const dummyImagesCount = Math.max(4 - imgPaths.length, 0);

      // Remove all existing dummy images
      previewGrid.querySelectorAll('.upload-section-2__preview-item.dummy').forEach(dummy => {
        previewGrid.removeChild(dummy);
      });

      // Add required dummy images
      for (let i = 0; i < dummyImagesCount; i++) {
        const imagePreview = document.createElement('div');
        imagePreview.classList.add('upload-section-2__preview-item', 'dummy');

        const imgElement = document.createElement('img');
        imgElement.src = 'images/loaderImage.jpg';
        imgElement.className = 'upload-section-2__preview-img';
        imagePreview.appendChild(imgElement);

        previewGrid.appendChild(imagePreview);
      }
      if (dummyImagesCount <= 0) {
        const imagePreview = document.createElement('div');
        imagePreview.classList.add('upload-section-2__preview-item', 'dummy');

        const imgElement = document.createElement('img');
        imgElement.src = 'images/loaderImage.jpg';
        imgElement.className = 'upload-section-2__preview-img';
        imagePreview.appendChild(imgElement);

        previewGrid.appendChild(imagePreview);
      }
    }


    function displayDummyImages() {
      const previewGrid = document.getElementById('previewGrid');
      // Get the count of current uploaded images
      const currentUploadedImages = previewGrid.querySelectorAll('.upload-section-2__preview-item img:not(.dummy)').length;
      const dummyImagesCount = Math.max(4 - imgPaths.length, 0);

      // Remove all existing dummy images
      previewGrid.querySelectorAll('.upload-section-2__preview-item.dummy').forEach(dummy => {
        previewGrid.removeChild(dummy);
      });

      // Add required dummy images
      for (let i = 0; i < dummyImagesCount+4; i++) {
        const imagePreview = document.createElement('div');
        imagePreview.classList.add('upload-section-2__preview-item', 'dummy');

        const imgElement = document.createElement('img');
        imgElement.src = DUMMY_IMAGE_SRC;
        imgElement.className = 'upload-section-2__preview-img';
        imagePreview.appendChild(imgElement);

        previewGrid.appendChild(imagePreview);
      }
    }

    function initializeImage() {
      const fileInput = document.getElementById('fileInput');
      const previewGrid = document.getElementById('previewGrid');
      const MAX_IMAGES = 4;


      function setImag(pathsImage) {
        imgPaths.push(...pathsImage);
        let imagePreview = document.getElementById('previewGrid');
        // imagePreview.innerHTML = ''
        pathsImage.forEach((imageSrc, index) => {


          const imagePreview = document.createElement('div');
          imagePreview.classList.add('upload-section-2__preview-item');

          const imgElement = document.createElement('img');
          imgElement.src = apiUrl + imageSrc + '?token=' + jwtToken;
          imgElement.className = 'upload-section-2__preview-img';
          imagePreview.appendChild(imgElement);

          const overlay = document.createElement('div');
          overlay.classList.add('upload-section-2__overlay');
          const overlayIcons = document.createElement('div');
          overlayIcons.classList.add('upload-section-2__overlay-icons');

          const viewIcon = document.createElement('img');
          viewIcon.src = 'images/eye_icon.svg';
          viewIcon.alt = 'View';
          viewIcon.className = 'upload-section-2__view-icon';
          overlayIcons.appendChild(viewIcon);

          const deleteIcon = document.createElement('img');
          deleteIcon.src = 'images/delete_icon.svg';
          deleteIcon.alt = 'Delete';
          deleteIcon.className = 'upload-section-2__delete-icon';
          overlayIcons.appendChild(deleteIcon);

          overlay.appendChild(overlayIcons);
          imagePreview.appendChild(overlay);

          previewGrid.appendChild(imagePreview);

          // Show overlay when an image is uploaded
          overlay.style.visibility = 'visible';

          // Add delete functionality
          deleteIcon.addEventListener('click', () => {

            // PropdeleteImg(imageSrc, imagePreview)


            Deleteimagesrc = imageSrc
            DeleteimagePrev = imagePreview
            document.getElementById('popupOverlay').style.display = 'flex'
            // previewGrid.removeChild(imagePreview);
            // console.log("img preview")
            // displayDummyImages();  // Update dummy images after deletion
          });

          // Add view functionality
          viewIcon.addEventListener('click', () => {
            const imgurl = apiUrl + imageSrc + '?token=' + jwtToken;
            showModal(imgurl);
          });

          // Update dummy images after adding new image
          displayDummyImages();

        });

      }


      function handleFiles(files, path = '') {
        let currentUploadedImages = previewGrid.querySelectorAll('.upload-section-2__preview-item img:not(.dummy)').length;

        for (const file of files) {
          if (file.size <= 15 * 1024 * 1024) {
            const reader = new FileReader();
            reader.onload = function (event) {

            };
            reader.readAsDataURL(file);
          } else {
            alert('File is too large: ' + file.name);
          }
        }
      }



      function showModal(imageSrc) {
        const modal = document.getElementById('imageModal');
        const fullImage = document.getElementById('fullImage');
        const closeButton = document.getElementsByClassName('close')[0];

        fullImage.src = imageSrc;
        modal.style.display = 'flex';

        closeButton.onclick = function () {
          modal.style.display = 'none';
        }

        window.onclick = function (event) {
          if (event.target == modal) {
            modal.style.display = 'none';
          }
        }
      }

      const uploadBox = document.querySelector('.upload-section-2__upload-box');

      uploadBox.addEventListener('click', function () {
        fileInput.click();
      });


      //  upload img
      $('#fileInput').on('change', function (event) {
        displayDummyImagesLoader();
        var formData = new FormData();
        var maxSize = 15 * 1024 * 1024;

        // Append all selected files to the FormData object
        $.each(this.files, function (i, file) {
          // formData.append('images', file);
          if (file.size <= maxSize) {
            formData.append('images', file);
          } else {
            console.warn(`File "${file.name}" exceeds the 15MB size limit.`);
          }
        });

        // Send the FormData object to the API endpoint
        const urlParams = new URLSearchParams(window.location.search);
        let propid = urlParams.get('id');
        if (!propid) {
          propid = '';
        }

        $.ajax({
          url: apiUrl + 'PropertyPhotos/upload?propid=' + propid,
          type: 'POST',
          data: formData,
          headers: {
            "Authorization": `Bearer ${jwtToken}`
          },
          processData: false, // Do not process data
          contentType: false, // Do not set content type header
          success: function (response) {
            // console.log('Files uploaded successfully:', response);
            console.log('Files paths:', response.data.filePaths.split('#:#'));
            // imgPaths.push(...response.data.filePaths.split('#:#'));
            // handleFiles(event.target.files);
            const pathsImage = response.data.filePaths.split('#:#');
            setImag(pathsImage);

          },
          error: function (jqXHR, textStatus, errorThrown) {
            displayDummyImages();
            console.error('File upload failed:', textStatus, errorThrown);
          }
        });
      });

      uploadBox.addEventListener('dragover', function (event) {
        event.preventDefault();
        event.stopPropagation();
        this.style.borderColor = '#007bff';
      });

      uploadBox.addEventListener('dragleave', function (event) {
        event.preventDefault();
        event.stopPropagation();
        this.style.borderColor = '#ccc';
      });

      uploadBox.addEventListener('drop', function (event) {
        event.preventDefault();
        event.stopPropagation();
        this.style.borderColor = '#ccc';
        handleFiles(event.dataTransfer.files);
      });

      // Display initial dummy images
      displayDummyImages();

      // editdata initialize data

      function editAddPropertices() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
          return;
        }
        $.ajax({
          url: apiUrl + 'PropertyBook/Byid?id=' + id,
          type: 'GET',
          contentType: 'application/json',
          headers: {
            "Authorization": `Bearer ${jwtToken}`
          },
          success: function (response) {
            console.log(response);
            if (response.success) {

              document.getElementById('properties-name').value = response.data.name;
              document.getElementById('address').value = response.data.addressLine1;
              document.getElementById('city').value = response.data.cityId;
              document.getElementById('state').value = response.data.stateId;
              document.getElementById('country').value = response.data.countryId;
              document.getElementById('floors').value = response.data.floors;
              document.getElementById('rooms').value = response.data.rooms;
              document.getElementById('living').value = response.data.living;
              document.getElementById('washroom').value = response.data.washrooms;
              document.getElementById('carpet').checked = response.data.isCarpet == 'True' ? true : false;
              document.getElementById('pool').checked = response.data.isSwimmingPool == 'True' ? true : false;
              document.getElementById('frontYard').checked = response.data.isFrontYard == 'True' ? true : false;
              document.getElementById('backYard').checked = response.data.isBackYard == 'True' ? true : false;
              document.getElementById('customSwitch').checked = response.data.isActive == 'True' ? true : false;

              //  add img
              setImag(response.dataList.images)
            }
          },
          error: function (xhr, status, error) {
            console.error('Error:', error);

          }
        });
      }
      // editAddPropertices()
      async function runFunctionsInSequence() {
        try {
          await setContryData();
          await setStateData();
          await setCityData();
          await editAddPropertices();
        } catch (error) {
          console.error('An error occurred:', error);
        }
      }
      runFunctionsInSequence();
    }

    document.addEventListener('DOMContentLoaded', function () {
      initializeImage();
    });
  </script>
